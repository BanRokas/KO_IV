<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .bigText {
        font-size: 48px;
      }

      .underline {
        text-decoration: underline;
      }

      .background {
        background-color: blue;
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section>
      <!-- Inline css -->
      <div>
        <h1 style="text-align: center">Centruotas tekstas</h1>
        <h1 style="color: red">Spalvotas Tekstas</h1>
        <h1 style="border: 1px solid black">Tekstas su remeliu</h1>
      </div>
      <!-- internal css -->
      <div>
        <h1 class="bigText">Didelis tekstas</h1>
        <h1 class="underline">Pabraktas tekstas</h1>
        <h1 class="background">Tekstas su fonu</h1>
      </div>
      <!-- external css -->
      <div>
        <h1 class="textright">Desineje lygiuotas tekstas</h1>
        <h1 class="textcross">Perbrauktas tekstas</h1>
        <h1 class="textshadow">Takstas su seseliu</h1>
      </div>
    </section>
  </body>
</html>
